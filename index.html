<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>카카오 API 연동 데모 (키 설정)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://t1.kakaocdn.net/kakao_js_sdk/2.8.1/kakao.min.js" xintegrity="sha384-OL+ylM/iuPLtW5U3XcvLSGhE8JzReKDank5InqlHGWPhb4140/yrBw0bg0y7+C9J" crossorigin="anonymous"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Pretendard:wght@400;600;700&display=swap');
        body { font-family: 'Pretendard', sans-serif; }
        .kakao-yellow { background-color: #FEE500; }
        .glass-morphism {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.3);
        }
    </style>
</head>
<body class="bg-slate-100 min-h-screen flex items-center justify-center p-4">

    <div class="max-w-md w-full space-y-6">
        <!-- Settings Card -->
        <div class="glass-morphism rounded-3xl shadow-xl p-6 border border-white">
            <h2 class="text-lg font-bold text-gray-800 mb-4 flex items-center gap-2">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 text-gray-500" viewBox="0 0 20 20" fill="currentColor">
                    <path fill-rule="evenodd" d="M11.49 3.17c-.38-1.56-2.6-1.56-2.98 0a1.532 1.532 0 01-2.286.948c-1.372-.836-2.942.734-2.106 2.106.54.886.061 2.042-.947 2.287-1.561.379-1.561 2.6 0 2.978a1.532 1.532 0 01.947 2.287c-.836 1.372.734 2.942 2.106 2.106a1.532 1.532 0 012.287.947c.379 1.561 2.6 1.561 2.978 0a1.533 1.533 0 012.287-.947c1.372.836 2.942-.734 2.106-2.106a1.533 1.533 0 01.947-2.287c1.561-.379 1.561-2.6 0-2.978a1.532 1.532 0 01-.947-2.287c.836-1.372-.734-2.942-2.106-2.106a1.532 1.532 0 01-2.287-.947zM10 13a3 3 0 100-6 3 3 0 000 6z" clip-rule="evenodd" />
                </svg>
                API 환경 설정
            </h2>
            
            <div class="space-y-4">
                <div>
                    <label class="block text-xs font-semibold text-gray-500 uppercase ml-1 mb-1">Kakao JavaScript Key</label>
                    <div class="flex gap-2">
                        <input type="password" id="key-input" placeholder="키를 입력하세요" 
                            class="flex-1 px-4 py-2 rounded-xl border border-gray-200 focus:ring-2 focus:ring-yellow-400 focus:border-transparent outline-none transition-all text-sm" />
                        <button onclick="saveKey()" class="px-4 py-2 bg-gray-800 text-white text-sm font-bold rounded-xl hover:bg-black transition-colors">
                            저장
                        </button>
                    </div>
                </div>
                <div id="sdk-status" class="text-[11px] flex items-center gap-1 text-red-500 font-medium ml-1">
                    <span class="w-2 h-2 rounded-full bg-red-500 animate-pulse"></span>
                    SDK 초기화 대기 중
                </div>
            </div>
        </div>

        <!-- Main Action Card -->
        <div class="glass-morphism rounded-3xl shadow-2xl overflow-hidden p-8 space-y-8 relative">
            <div id="overlay" class="absolute inset-0 bg-white/60 backdrop-blur-[2px] z-10 flex flex-col items-center justify-center text-center p-6 transition-opacity duration-300">
                <p class="text-gray-800 font-bold mb-2 text-lg">키 설정이 필요합니다</p>
                <p class="text-gray-500 text-sm">상단 설정창에 자바스크립트 키를 입력하고 저장해 주세요.</p>
            </div>

            <div class="text-center">
                <h1 class="text-2xl font-bold text-gray-800">Kakao API Demo</h1>
                <p class="text-gray-500 mt-2">인증 후 메시지 전송 테스트</p>
            </div>

            <div id="status-card" class="bg-white rounded-2xl p-6 border border-gray-100 shadow-sm text-center">
                <div id="auth-status" class="text-sm font-medium text-red-500 mb-4">
                    로그인이 필요한 서비스입니다.
                </div>

                <!-- Login Button -->
                <a id="kakao-login-btn" href="javascript:loginWithKakao()" class="inline-block transition-transform active:scale-95">
                    <img src="https://k.kakaocdn.net/14/dn/btroDszwNrM/I6efHub1SN5KCJqLm1Ovx1/o.jpg" width="222" alt="카카오 로그인 버튼" class="rounded-lg shadow-md" />
                </a>

                <!-- Action Button -->
                <button id="send-btn" onclick="sendToMe()" class="hidden w-full py-4 px-6 bg-yellow-400 hover:bg-yellow-500 text-black font-bold rounded-xl shadow-lg transition-all flex items-center justify-center gap-2">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" viewBox="0 0 20 20" fill="currentColor">
                        <path d="M10.894 2.553a1 1 0 00-1.788 0l-7 14a1 1 0 001.169 1.409l5-1.429A1 1 0 009 15.571V11a1 1 0 112 0v4.571a1 1 0 00.725.962l5 1.428a1 1 0 001.17-1.408l-7-14z" />
                    </svg>
                    나에게 메시지 보내기
                </button>
            </div>

            <button onclick="resetAll()" class="w-full text-xs text-gray-400 hover:text-red-500 transition-colors underline">
                모든 설정 및 토큰 초기화
            </button>
        </div>
    </div>

    <!-- Notification Toast -->
    <div id="toast" class="fixed bottom-10 left-1/2 -translate-x-1/2 translate-y-20 opacity-0 transition-all duration-300 bg-gray-800 text-white px-6 py-3 rounded-full shadow-2xl pointer-events-none z-50">
        <span id="toast-message"></span>
    </div>

    <script>
        // 상수 정의
        const STORAGE_KEY = 'kakao_demo_app_key';
        const REDIRECT_URI = window.location.origin + window.location.pathname;

        // 화면 요소
        const keyInput = document.getElementById('key-input');
        const sdkStatus = document.getElementById('sdk-status');
        const overlay = document.getElementById('overlay');
        const authStatus = document.getElementById('auth-status');
        const loginBtn = document.getElementById('kakao-login-btn');
        const sendBtn = document.getElementById('send-btn');

        // 1. 키 저장 및 초기화 로직
        function saveKey() {
            const key = keyInput.value.trim();
            if (!key) {
                showToast('키를 입력해주세요.');
                return;
            }
            localStorage.setItem(STORAGE_KEY, key);
            showToast('키가 저장되었습니다. 페이지를 새로고침합니다.');
            setTimeout(() => location.reload(), 1000);
        }

        function resetAll() {
            localStorage.removeItem(STORAGE_KEY);
            // 쿠키 삭제 (간단 구현)
            document.cookie = 'authorize-access-token=; expires=Thu, 01 Jan 1970 00:00:00 UTC; path=/;';
            location.reload();
        }

        // 2. 카카오 SDK 초기화
        function initKakao() {
            const savedKey = localStorage.getItem(STORAGE_KEY);
            if (savedKey) {
                keyInput.value = savedKey;
                try {
                    Kakao.init(savedKey);
                    if (Kakao.isInitialized()) {
                        sdkStatus.innerHTML = '<span class="w-2 h-2 rounded-full bg-green-500"></span> SDK 초기화 완료';
                        sdkStatus.classList.replace('text-red-500', 'text-green-600');
                        overlay.classList.add('opacity-0', 'pointer-events-none');
                        return true;
                    }
                } catch (e) {
                    sdkStatus.innerText = '❌ 초기화 실패: 키를 확인하세요.';
                    console.error(e);
                }
            }
            return false;
        }

        // 3. 로그인 및 기능 로직
        function loginWithKakao() {
            if (!Kakao.isInitialized()) return;
            Kakao.Auth.authorize({
                redirectUri: REDIRECT_URI,
                state: 'sendme_feed',
                scope: 'talk_message',
            });
        }

        function sendToMe() {
            Kakao.API.request({
                url: '/v2/api/talk/memo/default/send',
                data: {
                    template_object: {
                        object_type: 'feed',
                        content: {
                            title: 'API 키 입력 버전 테스트',
                            description: '이제 하드코딩 없이 직접 키를 입력해서 테스트할 수 있습니다.',
                            image_url: 'http://k.kakaocdn.net/dn/bLPLfX/dJMcacayNt1/iWQpxLOqbqcyg2hxzKCEE1/kakaolink40_original.png',
                            link: { mobile_web_url: REDIRECT_URI, web_url: REDIRECT_URI },
                        },
                        social: { like_count: 100, comment_count: 200, shared_count: 300 },
                        buttons: [{ title: '데모 확인', link: { mobile_web_url: REDIRECT_URI, web_url: REDIRECT_URI } }],
                    },
                },
            })
            .then(() => showToast('✅ 나에게 메시지 전송 성공!'))
            .catch((err) => showToast('❌ 전송 실패: ' + (err.msg || '권한 부족')));
        }

        // 4. 인증 상태 체크
        function checkAuthStatus() {
            const token = getCookie('authorize-access-token');
            if (token && Kakao.isInitialized()) {
                Kakao.Auth.setAccessToken(token);
                authStatus.innerText = '✅ 인증 완료: 메시지 전송이 가능합니다.';
                authStatus.classList.replace('text-red-500', 'text-green-600');
                loginBtn.classList.add('hidden');
                sendBtn.classList.remove('hidden');
            }
        }

        // 유틸리티 함수
        function getCookie(name) {
            const parts = document.cookie.split(name + '=');
            if (parts.length === 2) return parts[1].split(';')[0];
            return null;
        }

        function showToast(message) {
            const toast = document.getElementById('toast');
            const toastMsg = document.getElementById('toast-message');
            toastMsg.innerText = message;
            toast.classList.remove('translate-y-20', 'opacity-0');
            toast.classList.add('translate-y-0', 'opacity-100');
            setTimeout(() => {
                toast.classList.add('translate-y-20', 'opacity-0');
                toast.classList.remove('translate-y-0', 'opacity-100');
            }, 3000);
        }

        // 실행
        window.onload = function() {
            if (initKakao()) {
                checkAuthStatus();
            }
        };
    </script>
</body>
</html>
