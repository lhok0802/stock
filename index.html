<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2026 실시간 AI 트렌드 리포터 v3.9 (Auth Fix)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://t1.kakaocdn.net/kakao_js_sdk/2.8.1/kakao.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Pretendard:wght@400;600;700&display=swap');
        body { font-family: 'Pretendard', sans-serif; background-color: #f8fafc; }
        .glass { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.4); }
        .loading-spinner { border: 3px solid #f3f3f3; border-top: 3px solid #fbbf24; border-radius: 50%; width: 24px; height: 24px; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
    </style>
</head>
<body class="min-h-screen p-4 md:p-8">

    <div class="max-w-6xl mx-auto grid grid-cols-1 lg:grid-cols-12 gap-6">
        
        <!-- Left Column: Settings & News Explorer -->
        <div class="lg:col-span-5 space-y-6">
            <!-- API Configuration Card -->
            <div class="glass rounded-3xl p-6 shadow-xl border-t-4 border-yellow-400">
                <h2 class="text-lg font-bold text-slate-800 mb-4 flex items-center gap-2">
                    <span class="p-1.5 bg-yellow-100 rounded-lg text-yellow-600">🔑</span>
                    API 설정 관리
                </h2>
                <div class="space-y-4">
                    <div>
                        <label class="text-[11px] font-bold text-slate-500 ml-1 uppercase tracking-tight">Kakao JavaScript Key</label>
                        <input type="password" id="kakao-key" placeholder="카카오 JS 키를 입력하세요" class="w-full px-4 py-2.5 rounded-xl border border-slate-200 text-sm focus:ring-2 focus:ring-yellow-400 outline-none transition-all" />
                    </div>
                    <div>
                        <label class="text-[11px] font-bold text-slate-500 ml-1 uppercase tracking-tight">Gemini API Key</label>
                        <input type="password" id="gemini-key" placeholder="제미나이 API 키를 입력하세요" class="w-full px-4 py-2.5 rounded-xl border border-slate-200 text-sm focus:ring-2 focus:ring-blue-400 outline-none transition-all" />
                    </div>
                    <div class="p-3 bg-blue-50 rounded-xl flex items-center justify-between">
                        <span class="text-[10px] font-bold text-blue-600">Model: gemini-2.5-flash</span>
                        <div class="flex gap-2">
                            <button onclick="saveKeys()" class="text-[10px] bg-white border border-blue-200 px-2 py-1 rounded-md hover:bg-blue-50 transition-colors">키 저장</button>
                            <button onclick="clearKeys()" class="text-[10px] text-red-500 bg-white border border-red-100 px-2 py-1 rounded-md hover:bg-red-50 transition-colors">초기화</button>
                        </div>
                    </div>
                </div>
            </div>

            <!-- News Explorer Card -->
            <div class="glass rounded-3xl p-6 shadow-xl h-[520px] flex flex-col border-t-4 border-blue-400">
                <div class="flex justify-between items-center mb-4">
                    <h2 class="text-lg font-bold text-slate-800 flex items-center gap-2">
                        <span class="p-1.5 bg-blue-100 rounded-lg text-blue-600">🌐</span>
                        실시간 뉴스 데이터 (RSS)
                    </h2>
                    <button onclick="fetchLatestNews()" id="fetch-btn" class="px-4 py-1.5 bg-blue-600 text-white text-xs font-bold rounded-full hover:bg-blue-700 active:scale-95 transition-all">24h 뉴스 검색</button>
                </div>
                <div id="news-container" class="flex-1 overflow-y-auto space-y-3 pr-2 text-sm text-slate-600">
                    <div class="text-center py-20 opacity-30">
                        <p class="text-xs">경제, 기술, 문학 등 다각도의 트렌드를<br>동시에 수집하여 리포트를 구성합니다.</p>
                    </div>
                </div>
                <div id="news-loading" class="hidden flex items-center justify-center py-4 gap-2 text-sm text-slate-500">
                    <div class="loading-spinner"></div> 데이터 수집 중...
                </div>
            </div>
        </div>

        <!-- Right Column: AI Analysis & Delivery -->
        <div class="lg:col-span-7 space-y-6">
            <div class="glass rounded-3xl p-8 shadow-2xl min-h-[720px] flex flex-col relative overflow-hidden border-t-4 border-slate-800">
                <div class="absolute top-0 right-0 p-6 flex gap-3 items-center">
                    <div id="sdk-status" class="flex items-center gap-1.5 text-[10px] font-bold text-red-500 bg-red-50 px-2 py-1 rounded-full border border-red-100">
                        <span class="w-1.5 h-1.5 rounded-full bg-red-500"></span> SDK OFFLINE
                    </div>
                </div>

                <div class="mb-6">
                    <h1 class="text-3xl font-black text-slate-900 leading-tight">AI Strategic<br><span class="text-blue-600">Intelligence Report</span></h1>
                    <p class="text-slate-500 text-sm mt-3">2026년 4월 18일 기준 확장된 뉴스 데이터를 분석합니다.</p>
                </div>

                <!-- Analysis Content Area -->
                <div id="report-area" class="flex-1 bg-white/60 rounded-2xl border border-slate-100 p-6 overflow-y-auto mb-6 whitespace-pre-wrap text-slate-700 leading-relaxed text-sm shadow-inner scroll-smooth">
                    [분석 대기 중] 뉴스 검색 후 버튼을 눌러 리포트를 생성하세요.
                </div>

                <!-- Action Buttons -->
                <div class="grid grid-cols-2 gap-4">
                    <button onclick="generateAIReport()" id="gen-btn" class="py-4 bg-slate-900 text-white rounded-2xl font-bold shadow-lg hover:bg-black active:scale-[0.98] disabled:opacity-50 transition-all flex items-center justify-center gap-2">
                        <span>✨</span> 리포트 생성 (Gemini 2.5)
                    </button>
                    <button onclick="sendToKakao()" id="kakao-btn" disabled class="py-4 bg-yellow-400 text-black rounded-2xl font-bold shadow-lg hover:bg-yellow-500 active:scale-[0.98] disabled:opacity-30 transition-all flex items-center justify-center gap-2">
                        <span>💬</span> 카톡으로 전송
                    </button>
                </div>
                
                <div id="auth-box" class="mt-4 text-center">
                    <button id="login-trigger-btn" onclick="loginWithKakao()" class="text-[10px] text-slate-400 hover:text-blue-600 underline transition-colors">카카오 인증 상태 확인</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Notification Container -->
    <div id="toast" class="fixed bottom-10 left-1/2 -translate-x-1/2 translate-y-20 opacity-0 transition-all duration-300 bg-slate-900 text-white px-8 py-3.5 rounded-2xl shadow-2xl z-50 text-xs font-semibold">
        <span id="toast-msg"></span>
    </div>

    <script>
        const KAKAO_KEY_STORE = 'kakao_key_v3.2';
        const GEMINI_KEY_STORE = 'gemini_key_v3.2';
        const TOKEN_STORE = 'kakao_access_token_v3.2';
        const REDIRECT_URI = window.location.origin + window.location.pathname;

        let rawNewsData = "";
        let finalReport = "";

        // 1. 초기화 로직
        function saveKeys() {
            const kKey = document.getElementById('kakao-key').value.trim();
            const gKey = document.getElementById('gemini-key').value.trim();
            if (kKey) localStorage.setItem(KAKAO_KEY_STORE, kKey);
            if (gKey) localStorage.setItem(GEMINI_KEY_STORE, gKey);
            showToast('API 설정이 브라우저에 저장되었습니다.');
        }

        function clearKeys() {
            if(confirm('모든 데이터를 초기화할까요?')) {
                localStorage.clear();
                location.reload();
            }
        }

        function initApp() {
            const kKey = localStorage.getItem(KAKAO_KEY_STORE);
            const gKey = localStorage.getItem(GEMINI_KEY_STORE);
            if (kKey) document.getElementById('kakao-key').value = kKey;
            if (gKey) document.getElementById('gemini-key').value = gKey;

            // URL에 인가 코드(code)가 있는지 확인
            const params = new URLSearchParams(window.location.search);
            const authCode = params.get('code');

            if (authCode) {
                // 인가 코드가 있으면 SDK 초기화 후 토큰 교환 시도
                if (ensureKakaoInit()) {
                    exchangeToken(authCode);
                }
            } else {
                // 인가 코드가 없어도 기존 토큰이 있다면 초기화 및 세팅
                ensureKakaoInit();
            }
        }

        function getActiveKey(inputId, storageKey) {
            const val = document.getElementById(inputId).value.trim();
            return val || localStorage.getItem(storageKey);
        }

        function ensureKakaoInit() {
            if (typeof Kakao === 'undefined') return false;
            if (Kakao.isInitialized()) return true;

            const kKey = getActiveKey('kakao-key', KAKAO_KEY_STORE);
            if (!kKey) return false;

            try {
                Kakao.init(kKey);
                const badge = document.getElementById('sdk-status');
                badge.innerHTML = '<span class="w-1.5 h-1.5 rounded-full bg-green-500"></span> SDK ONLINE';
                badge.classList.replace('text-red-500', 'text-green-600');
                badge.classList.replace('bg-red-50', 'bg-green-50');
                checkKakaoAuth();
                return true;
            } catch (e) {
                console.error('Kakao Init Error:', e);
                return false;
            }
        }

        // 2. 인가 코드를 토큰으로 교환하는 함수
        async function exchangeToken(code) {
            const kKey = getActiveKey('kakao-key', KAKAO_KEY_STORE);
            showToast('인증 정보를 확인 중입니다...');
            
            try {
                // 브라우저 직접 호출 시 CORS 이슈가 있을 수 있으나, 가이드에 따라 fetch 시도
                const response = await fetch('https://kauth.kakao.com/oauth/token', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/x-www-form-urlencoded;charset=utf-8' },
                    body: new URLSearchParams({
                        grant_type: 'authorization_code',
                        client_id: kKey,
                        redirect_uri: REDIRECT_URI,
                        code: code
                    })
                });

                const data = await response.json();

                if (data.access_token) {
                    localStorage.setItem(TOKEN_STORE, data.access_token);
                    Kakao.Auth.setAccessToken(data.access_token);
                    showToast('✅ 카카오 인증에 성공했습니다!');
                    checkKakaoAuth();
                    // URL에서 code 파라미터 제거 (선택 사항)
                    window.history.replaceState({}, document.title, REDIRECT_URI);
                } else {
                    throw new Error(data.error_description || '토큰 교환 실패');
                }
            } catch (err) {
                console.warn('자동 토큰 교환 실패(CORS 등):', err);
                const manualToken = prompt('보안 정책으로 자동 인증이 제한되었습니다.\n카카오 개발자 도구에서 발급받은 Access Token이 있다면 입력해주세요:');
                if (manualToken) {
                    localStorage.setItem(TOKEN_STORE, manualToken);
                    location.reload();
                }
            }
        }

        // 3. 뉴스 데이터 수집
        async function fetchLatestNews() {
            const container = document.getElementById('news-container');
            const loader = document.getElementById('news-loading');
            const btn = document.getElementById('fetch-btn');

            container.innerHTML = "";
            loader.classList.remove('hidden');
            btn.disabled = true;

            try {
                const mainQuery = encodeURIComponent('AI (경제 OR 기술 OR 시장 OR 문학 OR 투자 OR 전략) when:1d');
                const rssUrl = `https://news.google.com/rss/search?q=${mainQuery}&hl=ko&gl=KR&ceid=KR:ko`;
                const apiUrl = `https://api.rss2json.com/v1/api.json?rss_url=${encodeURIComponent(rssUrl)}`;

                const res = await fetch(apiUrl);
                const data = await res.json();

                if (data.status === 'ok' && data.items.length > 0) {
                    rawNewsData = data.items.map(item => `- [${item.pubDate}] ${item.title}`).join('\n');
                    container.innerHTML = data.items.map(item => `
                        <div class="p-3.5 bg-white rounded-2xl border border-slate-100 shadow-sm text-xs hover:border-blue-200 transition-colors">
                            <h3 class="font-bold text-slate-800 mb-2 line-clamp-2">${item.title}</h3>
                            <div class="flex justify-between items-center text-[10px] text-slate-400">
                                <span>${item.pubDate.split(' ')[0]}</span>
                                <a href="${item.link}" target="_blank" class="text-blue-500 hover:underline">기사보기</a>
                            </div>
                        </div>
                    `).join('');
                    showToast('최신 뉴스 검색 성공');
                }
            } catch (e) {
                showToast('뉴스 수집 실패');
            } finally {
                loader.classList.add('hidden');
                btn.disabled = false;
            }
        }

        // 4. AI 리포트 생성
        async function generateAIReport() {
            if (!rawNewsData) return showToast('먼저 뉴스를 검색해 주세요.');
            const geminiKey = getActiveKey('gemini-key', GEMINI_KEY_STORE);
            if (!geminiKey) return showToast('Gemini API 키가 필요합니다.');

            const reportArea = document.getElementById('report-area');
            const genBtn = document.getElementById('gen-btn');

            reportArea.innerText = "데이터 분석 중...";
            genBtn.disabled = true;

            const systemPrompt = `당신은 증권사 수석 애널리스트입니다. 뉴스 데이터를 기반으로 '2026 AI 전략 리포트'를 작성하세요. 마크다운 기호를 절대 사용하지 말고 일반 텍스트와 이모지만 사용하십시오. 반드시 180~200자 사이의 분량으로 요약하세요`;

            try {
                const response = await callGeminiAPI(geminiKey, `데이터 분석 요청:\n${rawNewsData}`, systemPrompt);
                finalReport = response.candidates?.[0]?.content?.parts?.[0]?.text || "분석 실패";
                reportArea.innerText = finalReport;
                document.getElementById('kakao-btn').disabled = false;
                showToast('AI 리포트 생성 성공');
            } catch (e) {
                reportArea.innerText = `에러: ${e.message}`;
            } finally {
                genBtn.disabled = false;
            }
        }

        async function callGeminiAPI(key, prompt, systemInstruction) {
            const modelName = "gemini-2.5-flash"; 
            const url = `https://generativelanguage.googleapis.com/v1beta/models/${modelName}:generateContent?key=${key}`;
            const payload = {
                contents: [{ parts: [{ text: prompt }] }],
                systemInstruction: { parts: [{ text: systemInstruction }] }
            };
            const res = await fetch(url, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(payload) });
            const result = await res.json();
            if (res.ok) return result;
            if (res.status === 404) {
                const retryUrl = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview:generateContent?key=${key}`;
                const retryRes = await fetch(retryUrl, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(payload) });
                if (retryRes.ok) return await retryRes.json();
            }
            throw new Error(result.error?.message || "모델 응답 오류");
        }

        // 5. 전송 (인가 코드 기반 토큰 활용)
        function sendToKakao() {
            if (!finalReport) return;
            
            // 전송 전 초기화 및 토큰 세팅 재확인
            if (!ensureKakaoInit()) return;
            
            const savedToken = localStorage.getItem(TOKEN_STORE);
            if (!savedToken) {
                showToast('인증 토큰이 없습니다. 로그인을 먼저 해주세요.');
                return;
            }
            
            // SDK에 토큰 강제 주입
            Kakao.Auth.setAccessToken(savedToken);

            Kakao.API.request({
                url: '/v2/api/talk/memo/default/send',
                data: {
                    template_object: {
                        object_type: 'text',
                        content: {
                            text: finalReport,
                        },
                    },
                },
            }).then(() => showToast('✅ 카톡 발송 성공')).catch((err) => {
                console.error('메시지 전송 에러:', err);
                showToast('❌ 발송 실패: 인증 세션이 만료되었을 수 있습니다.');
            });
        }

        function loginWithKakao() {
            if (!ensureKakaoInit()) return;
            // 인가 코드 방식 사용
            Kakao.Auth.authorize({ redirectUri: REDIRECT_URI, scope: 'talk_message' });
        }

        function checkKakaoAuth() {
            const token = localStorage.getItem(TOKEN_STORE) || getCookie('authorize-access-token');
            if (token) {
                Kakao.Auth.setAccessToken(token);
                document.getElementById('auth-box').innerHTML = '<span class="text-[10px] text-green-600 font-bold">● 카카오톡 인증 완료</span>';
            }
        }

        function getCookie(name) {
            const parts = document.cookie.split(name + '=');
            if (parts.length === 2) return parts[1].split(';')[0];
            return null;
        }

        function showToast(msg) {
            const t = document.getElementById('toast');
            document.getElementById('toast-msg').innerText = msg;
            t.classList.replace('opacity-0', 'opacity-100');
            t.classList.replace('translate-y-20', 'translate-y-0');
            setTimeout(() => {
                t.classList.replace('opacity-100', 'opacity-0');
                t.classList.replace('translate-y-0', 'translate-y-20');
            }, 3000);
        }

        window.onload = initApp;
    </script>
</body>
</html>
