<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2026 AI 트렌드 리포트 전송 시스템</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://t1.kakaocdn.net/kakao_js_sdk/2.8.1/kakao.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Pretendard:wght@400;600;700&display=swap');
        body { font-family: 'Pretendard', sans-serif; }
        .glass-morphism {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.3);
        }
        .step-active { border-color: #FEE500; background-color: #fffbeb; }
    </style>
</head>
<body class="bg-slate-100 min-h-screen flex items-center justify-center p-4">

    <div class="max-w-md w-full space-y-4">
        <!-- 1. API Key Setting Card -->
        <div class="glass-morphism rounded-2xl shadow-lg p-5 border border-white">
            <h2 class="text-sm font-bold text-gray-700 mb-3 flex items-center gap-2">
                <span class="w-5 h-5 bg-gray-200 rounded-full flex items-center justify-center text-[10px]">1</span>
                JavaScript 키 설정
            </h2>
            <div class="flex gap-2">
                <input type="password" id="key-input" placeholder="JavaScript 키를 입력하세요" 
                    class="flex-1 px-3 py-2 rounded-xl border border-gray-200 text-sm outline-none focus:ring-2 focus:ring-yellow-400" />
                <button onclick="saveKey()" class="px-4 py-2 bg-gray-800 text-white text-xs font-bold rounded-xl hover:bg-black">저장</button>
            </div>
        </div>

        <!-- 2. Auth Status Card -->
        <div class="glass-morphism rounded-3xl shadow-2xl overflow-hidden p-8 space-y-6 relative">
            <div id="overlay" class="absolute inset-0 bg-white/80 backdrop-blur-[1px] z-10 flex flex-col items-center justify-center text-center p-6 transition-opacity duration-300">
                <p class="text-gray-800 font-bold mb-1">키 설정이 필요합니다</p>
                <p class="text-gray-500 text-xs">상단에 키를 입력하고 저장해 주세요.</p>
            </div>

            <div class="text-center">
                <h1 class="text-xl font-bold text-gray-800">2026 AI Trend Report</h1>
                <p class="text-gray-500 text-xs mt-1">경제·문학·기술 융합 리포트 전송</p>
            </div>

            <div id="process-card" class="bg-white rounded-2xl p-6 border border-gray-100 shadow-sm text-center space-y-4">
                <div id="status-msg" class="text-sm font-medium text-gray-600">
                    리포트 전송 준비 중...
                </div>

                <div id="action-container">
                    <!-- Step 1: Login -->
                    <a id="login-btn" href="javascript:loginWithKakao()" class="inline-block transition-transform active:scale-95">
                        <img src="https://k.kakaocdn.net/14/dn/btroDszwNrM/I6efHub1SN5KCJqLm1Ovx1/o.jpg" width="180" alt="카카오 로그인" class="rounded-lg shadow-sm" />
                    </a>

                    <!-- Step 2: Get Token -->
                    <button id="token-btn" onclick="requestAccessToken()" class="hidden w-full py-3 bg-gray-800 text-white text-sm font-bold rounded-xl shadow-md hover:bg-black">
                        엑세스 토큰으로 교환하기
                    </button>

                    <!-- Step 3: Send Report -->
                    <button id="send-btn" onclick="sendToMe()" class="hidden w-full py-3 bg-yellow-400 text-black text-sm font-bold rounded-xl shadow-md hover:bg-yellow-500 transition-all flex items-center justify-center gap-2">
                        <span class="text-lg">📩</span>
                        2026 AI 트렌드 리포트 받기
                    </button>
                </div>
            </div>

            <!-- Report Preview (User only) -->
            <div id="report-preview" class="hidden text-[11px] bg-slate-50 p-4 rounded-xl border border-dashed border-slate-200 text-slate-600">
                <p class="font-bold text-gray-800 mb-2">📄 전송될 리포트 내용 미리보기</p>
                <div id="preview-content" class="whitespace-pre-wrap leading-relaxed"></div>
            </div>

            <div class="flex justify-between items-center">
                <button onclick="resetAll()" class="text-[10px] text-gray-400 hover:text-red-500 underline">전체 초기화</button>
                <div id="sdk-badge" class="text-[10px] text-red-500 font-bold">SDK Offline</div>
            </div>
        </div>
    </div>

    <div id="toast" class="fixed bottom-10 left-1/2 -translate-x-1/2 translate-y-20 opacity-0 transition-all duration-300 bg-gray-800 text-white px-6 py-3 rounded-full shadow-2xl pointer-events-none z-50 text-sm">
        <span id="toast-message"></span>
    </div>

    <script>
        const STORAGE_KEY = 'kakao_demo_app_key';
        const TOKEN_STORAGE_KEY = 'kakao_access_token';
        const REDIRECT_URI = window.location.origin + window.location.pathname;

        // --- 2026 AI 리포트 데이터 생성 (분석 결과 기반) ---
        const reportData = {
            title: "2026 AI 초지능 리포트: 혁신의 임계점",
            economy: "📈 [경제] '진실의 해(Year of Truth)'\n• 기업 87%가 AI를 기간 인프라로 채택 (Capgemini 2026)\n• 글로벌 GDP 7조 달러 부양 효과 가시화 (Stanford SETR 2026)",
            literature: "✍️ [문학/창의] '창작 동반자'의 진화\n• 텍스트-3D 연계 월드 모델 기반 서사 확산 (World Labs 2026)\n• AI 활용 교육 표준 가이드라인 정립 (OECD Digital Education Outlook)",
            technology: "🤖 [기술] '에이전틱 AI' & '피지컬 AI'\n• 자율적 도구 사용 및 물리 작업 수행 표준화 (Gartner/McKinsey 2026)\n• 양자 컴퓨팅 기반 초고율 학습 인프라 전환",
            insight: "🚀 최종통찰: AI를 단순 도구가 아닌 '운영 체제'로 재설계하여 압도적 격차를 확보하십시오!"
        };

        const formattedText = `${reportData.title}\n\n${reportData.economy}\n\n${reportData.literature}\n\n${reportData.technology}\n\n${reportData.insight}`;

        function saveKey() {
            const key = document.getElementById('key-input').value.trim();
            if (!key) return showToast('키를 입력하세요.');
            localStorage.setItem(STORAGE_KEY, key);
            location.href = REDIRECT_URI;
        }

        function resetAll() {
            localStorage.removeItem(STORAGE_KEY);
            localStorage.removeItem(TOKEN_STORAGE_KEY);
            location.href = REDIRECT_URI;
        }

        function initApp() {
            const savedKey = localStorage.getItem(STORAGE_KEY);
            if (!savedKey) return;

            try {
                Kakao.init(savedKey);
                document.getElementById('key-input').value = savedKey;
                document.getElementById('overlay').classList.add('hidden');
                document.getElementById('sdk-badge').innerText = 'SDK Online';
                document.getElementById('sdk-badge').classList.replace('text-red-500', 'text-green-500');
                document.getElementById('preview-content').innerText = formattedText;
                document.getElementById('report-preview').classList.remove('hidden');
                
                checkProcessStage();
            } catch (e) {
                console.error(e);
                showToast('SDK 초기화 실패.');
            }
        }

        function checkProcessStage() {
            const params = new URLSearchParams(window.location.search);
            const code = params.get('code');
            const savedToken = localStorage.getItem(TOKEN_STORAGE_KEY);
            const statusMsg = document.getElementById('status-msg');

            document.getElementById('login-btn').classList.add('hidden');
            document.getElementById('token-btn').classList.add('hidden');
            document.getElementById('send-btn').classList.add('hidden');

            if (savedToken) {
                statusMsg.innerText = '인증 완료! 리포트를 전송할 수 있습니다.';
                document.getElementById('send-btn').classList.remove('hidden');
                Kakao.Auth.setAccessToken(savedToken);
            } else if (code) {
                statusMsg.innerText = '인가 코드 확인됨. 토큰 교환이 필요합니다.';
                document.getElementById('token-btn').classList.remove('hidden');
            } else {
                statusMsg.innerText = '카카오 로그인 후 리포트를 받아보세요.';
                document.getElementById('login-btn').classList.remove('hidden');
            }
        }

        function loginWithKakao() {
            Kakao.Auth.authorize({ redirectUri: REDIRECT_URI, scope: 'talk_message' });
        }

        async function requestAccessToken() {
            const params = new URLSearchParams(window.location.search);
            const code = params.get('code');
            const savedKey = localStorage.getItem(STORAGE_KEY);
            
            try {
                // 이 부분은 실제 서버 구현이 필요하지만, 사용자의 편의를 위해 수동 입력/CORS 대응 로직 유지
                const manualToken = prompt('CORS 정책으로 인해 자동 교환이 제한될 수 있습니다.\n발급받은 Access Token을 입력하거나 서버 연동을 진행하세요:');
                if (manualToken) {
                    localStorage.setItem(TOKEN_STORAGE_KEY, manualToken);
                    checkProcessStage();
                }
            } catch (err) {
                showToast('토큰 처리 에러');
            }
        }

        function sendToMe() {
            Kakao.API.request({
                url: '/v2/api/talk/memo/default/send',
                data: {
                    template_object: {
                        object_type: 'feed',
                        content: {
                            title: reportData.title,
                            description: reportData.economy.split('\n')[0] + " 외 최신 트렌드 요약",
                            image_url: 'https://images.unsplash.com/photo-1677442136019-21780ecad995?auto=format&fit=crop&q=80&w=800',
                            link: { mobile_web_url: REDIRECT_URI, web_url: REDIRECT_URI },
                        },
                        item_content: {
                            items: [
                                { item: "경제동향", item_op: "성숙기 진입" },
                                { item: "문학동향", item_op: "창작 동반자" },
                                { item: "기술동향", item_op: "에이전틱 AI" }
                            ]
                        },
                        buttons: [{
                            title: '리포트 전문 보기',
                            link: { mobile_web_url: REDIRECT_URI, web_url: REDIRECT_URI }
                        }],
                    },
                },
            })
            .then(() => showToast('✅ 카카오톡으로 리포트가 전송되었습니다!'))
            .catch((err) => showToast('❌ 전송 실패: ' + (err.msg || '권한 부족')));
        }

        function showToast(message) {
            const toast = document.getElementById('toast');
            const toastMsg = document.getElementById('toast-message');
            toastMsg.innerText = message;
            toast.classList.remove('translate-y-20', 'opacity-0');
            toast.classList.add('translate-y-0', 'opacity-100');
            setTimeout(() => {
                toast.classList.add('translate-y-20', 'opacity-0');
                toast.classList.remove('translate-y-0', 'opacity-100');
            }, 3000);
        }

        window.onload = initApp;
    </script>
</body>
</html>
