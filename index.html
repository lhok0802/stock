<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>카카오 API 연동 데모 (Auth Code 처리)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://t1.kakaocdn.net/kakao_js_sdk/2.8.1/kakao.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Pretendard:wght@400;600;700&display=swap');
        body { font-family: 'Pretendard', sans-serif; }
        .glass-morphism {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.3);
        }
        .step-active { border-color: #FEE500; background-color: #fffbeb; }
    </style>
</head>
<body class="bg-slate-100 min-h-screen flex items-center justify-center p-4">

    <div class="max-w-md w-full space-y-4">
        <!-- 1. API Key Setting Card -->
        <div class="glass-morphism rounded-2xl shadow-lg p-5 border border-white">
            <h2 class="text-sm font-bold text-gray-700 mb-3 flex items-center gap-2">
                <span class="w-5 h-5 bg-gray-200 rounded-full flex items-center justify-center text-[10px]">1</span>
                JavaScript 키 설정
            </h2>
            <div class="flex gap-2">
                <input type="password" id="key-input" placeholder="JavaScript 키를 입력하세요" 
                    class="flex-1 px-3 py-2 rounded-xl border border-gray-200 text-sm outline-none focus:ring-2 focus:ring-yellow-400" />
                <button onclick="saveKey()" class="px-4 py-2 bg-gray-800 text-white text-xs font-bold rounded-xl hover:bg-black">저장</button>
            </div>
        </div>

        <!-- 2. Auth Status Card -->
        <div class="glass-morphism rounded-3xl shadow-2xl overflow-hidden p-8 space-y-6 relative">
            <!-- Overlay for uninitialized state -->
            <div id="overlay" class="absolute inset-0 bg-white/80 backdrop-blur-[1px] z-10 flex flex-col items-center justify-center text-center p-6 transition-opacity duration-300">
                <p class="text-gray-800 font-bold mb-1">키 설정이 필요합니다</p>
                <p class="text-gray-500 text-xs">상단에 키를 입력하고 저장해 주세요.</p>
            </div>

            <div class="text-center">
                <h1 class="text-xl font-bold text-gray-800">Kakao Message Demo</h1>
                <p class="text-gray-500 text-xs mt-1">인가 코드(Code) 방식 인증 프로세스</p>
            </div>

            <!-- Steps UI -->
            <div class="grid grid-cols-3 gap-2">
                <div id="step-1" class="text-[10px] text-center p-2 rounded-lg border-2 border-gray-100 text-gray-400">1. 인가 코드</div>
                <div id="step-2" class="text-[10px] text-center p-2 rounded-lg border-2 border-gray-100 text-gray-400">2. 토큰 교환</div>
                <div id="step-3" class="text-[10px] text-center p-2 rounded-lg border-2 border-gray-100 text-gray-400">3. 메시지 전송</div>
            </div>

            <div id="process-card" class="bg-white rounded-2xl p-6 border border-gray-100 shadow-sm text-center space-y-4">
                <div id="status-msg" class="text-sm font-medium text-gray-600">
                    진행 상태를 확인 중입니다...
                </div>

                <!-- Action Button Container -->
                <div id="action-container">
                    <!-- Step 1: Login -->
                    <a id="login-btn" href="javascript:loginWithKakao()" class="inline-block transition-transform active:scale-95">
                        <img src="https://k.kakaocdn.net/14/dn/btroDszwNrM/I6efHub1SN5KCJqLm1Ovx1/o.jpg" width="180" alt="카카오 로그인" class="rounded-lg shadow-sm" />
                    </a>

                    <!-- Step 2: Get Token -->
                    <button id="token-btn" onclick="requestAccessToken()" class="hidden w-full py-3 bg-gray-800 text-white text-sm font-bold rounded-xl shadow-md hover:bg-black transition-all">
                        엑세스 토큰으로 교환하기
                    </button>

                    <!-- Step 3: Send Message -->
                    <button id="send-btn" onclick="sendToMe()" class="hidden w-full py-3 bg-yellow-400 text-black text-sm font-bold rounded-xl shadow-md hover:bg-yellow-500 transition-all flex items-center justify-center gap-2">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 19l9 2-9-18-9 18 9-2zm0 0v-8" /></svg>
                        나에게 메시지 보내기
                    </button>
                </div>
            </div>

            <div class="flex justify-between items-center">
                <button onclick="resetAll()" class="text-[10px] text-gray-400 hover:text-red-500 underline transition-colors">전체 초기화</button>
                <div id="sdk-badge" class="text-[10px] text-red-500 font-bold">SDK Offline</div>
            </div>
        </div>

        <!-- Tip Box -->
        <div id="cors-notice" class="hidden bg-blue-50 border border-blue-100 rounded-xl p-4">
            <p class="text-[11px] text-blue-700 leading-relaxed">
                <strong>💡 참고:</strong> 브라우저 환경에서는 카카오 보안 정책(CORS)으로 인해 인가 코드를 토큰으로 직접 교환하는 것이 차단될 수 있습니다. 실제 서비스에서는 이 과정을 <strong>서버(Node.js, Python 등)</strong>에서 처리해야 합니다.
            </p>
        </div>
    </div>챙

    <!-- Notification Toast -->
    <div id="toast" class="fixed bottom-10 left-1/2 -translate-x-1/2 translate-y-20 opacity-0 transition-all duration-300 bg-gray-800 text-white px-6 py-3 rounded-full shadow-2xl pointer-events-none z-50 text-sm">
        <span id="toast-message"></span>
    </div>

    <script>
        const STORAGE_KEY = 'kakao_demo_app_key';
        const TOKEN_STORAGE_KEY = 'kakao_access_token';
        const REDIRECT_URI = window.location.origin + window.location.pathname;

        let currentAuthCode = null;

        // 1. 초기화 및 키 관리
        function saveKey() {
            const key = document.getElementById('key-input').value.trim();
            if (!key) return showToast('키를 입력하세요.');
            localStorage.setItem(STORAGE_KEY, key);
            location.href = REDIRECT_URI; // 파라미터 없는 깨끗한 상태로 새로고침
        }

        function resetAll() {
            localStorage.removeItem(STORAGE_KEY);
            localStorage.removeItem(TOKEN_STORAGE_KEY);
            location.href = REDIRECT_URI;
        }

        function initApp() {
            const savedKey = localStorage.getItem(STORAGE_KEY);
            if (!savedKey) return;

            try {
                Kakao.init(savedKey);
                document.getElementById('key-input').value = savedKey;
                document.getElementById('overlay').classList.add('hidden');
                document.getElementById('sdk-badge').innerText = 'SDK Online';
                document.getElementById('sdk-badge').classList.replace('text-red-500', 'text-green-500');
                
                checkProcessStage();
            } catch (e) {
                console.error(e);
                showToast('SDK 초기화 실패. 키를 확인하세요.');
            }
        }

        // 2. 프로세스 단계 체크 (인가 코드 또는 토큰 확인)
        function checkProcessStage() {
            const params = new URLSearchParams(window.location.search);
            const code = params.get('code');
            const savedToken = localStorage.getItem(TOKEN_STORAGE_KEY);

            const s1 = document.getElementById('step-1');
            const s2 = document.getElementById('step-2');
            const s3 = document.getElementById('step-3');
            const statusMsg = document.getElementById('status-msg');

            // 초기화
            [s1, s2, s3].forEach(el => el.classList.remove('step-active', 'text-gray-800', 'font-bold'));
            document.getElementById('login-btn').classList.add('hidden');
            document.getElementById('token-btn').classList.add('hidden');
            document.getElementById('send-btn').classList.add('hidden');

            if (savedToken) {
                // 단계 3: 토큰이 이미 있는 경우
                s3.classList.add('step-active', 'text-gray-800', 'font-bold');
                statusMsg.innerText = '인증이 완료되었습니다!';
                document.getElementById('send-btn').classList.remove('hidden');
                Kakao.Auth.setAccessToken(savedToken);
            } else if (code) {
                // 단계 2: 인가 코드가 URL에 있는 경우
                currentAuthCode = code;
                s2.classList.add('step-active', 'text-gray-800', 'font-bold');
                statusMsg.innerHTML = `인가 코드를 찾았습니다.<br><span class="text-[10px] text-gray-400 break-all">${code}</span>`;
                document.getElementById('token-btn').classList.remove('hidden');
                document.getElementById('cors-notice').classList.remove('hidden');
            } else {
                // 단계 1: 아무것도 없는 초기 상태
                s1.classList.add('step-active', 'text-gray-800', 'font-bold');
                statusMsg.innerText = '카카오 로그인을 시작해 주세요.';
                document.getElementById('login-btn').classList.remove('hidden');
            }
        }

        // 3. 인가 코드 받기 (Redirection)
        function loginWithKakao() {
            Kakao.Auth.authorize({
                redirectUri: REDIRECT_URI,
                scope: 'talk_message'
            });
        }

        // 4. 토큰 교환 요청 (프론트엔드에서 시도)
        async function requestAccessToken() {
            const savedKey = localStorage.getItem(STORAGE_KEY);
            showToast('토큰 교환을 시도합니다...');

            // 주의: 이 요청은 브라우저에서 CORS 정책에 의해 차단될 확률이 매우 높습니다.
            // 원래는 서버사이드에서 실행해야 하는 로직입니다.
            try {
                const response = await fetch('https://kauth.kakao.com/oauth/token', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/x-www-form-urlencoded;charset=utf-8' },
                    body: new URLSearchParams({
                        grant_type: 'authorization_code',
                        client_id: savedKey,
                        redirect_uri: REDIRECT_URI,
                        code: currentAuthCode
                    })
                });

                const data = await response.json();

                if (data.access_token) {
                    localStorage.setItem(TOKEN_STORAGE_KEY, data.access_token);
                    showToast('✅ 토큰 획득 성공!');
                    checkProcessStage();
                } else {
                    throw new Error(data.error_description || '토큰 획득 실패');
                }
            } catch (err) {
                console.error(err);
                showToast('❌ CORS 또는 인증 에러가 발생했습니다.');
                
                // 데모를 위해 수동 입력 요청 (실제 환경 대응용)
                const manualToken = prompt('CORS로 인해 자동 교환이 차단되었습니다.\n별도로 발급받은 Access Token이 있다면 입력해주세요:');
                if (manualToken) {
                    localStorage.setItem(TOKEN_STORAGE_KEY, manualToken);
                    checkProcessStage();
                }
            }
        }

        // 5. 메시지 전송
        function sendToMe() {
            Kakao.API.request({
                url: '/v2/api/talk/memo/default/send',
                data: {
                    template_object: {
                        object_type: 'feed',
                        content: {
                            title: '인가 코드 처리 완료!',
                            description: 'URL 쿼리스트링의 code를 사용하여 성공적으로 메시지를 보냈습니다.',
                            image_url: 'http://k.kakaocdn.net/dn/bLPLfX/dJMcacayNt1/iWQpxLOqbqcyg2hxzKCEE1/kakaolink40_original.png',
                            link: { mobile_web_url: REDIRECT_URI, web_url: REDIRECT_URI },
                        },
                        buttons: [{ title: '결과 확인', link: { mobile_web_url: REDIRECT_URI, web_url: REDIRECT_URI } }],
                    },
                },
            })
            .then(() => showToast('✅ 나에게 메시지 전송 성공!'))
            .catch((err) => showToast('❌ 전송 실패: ' + (err.msg || '권한 부족')));
        }

        // 유틸리티
        function showToast(message) {
            const toast = document.getElementById('toast');
            const toastMsg = document.getElementById('toast-message');
            toastMsg.innerText = message;
            toast.classList.remove('translate-y-20', 'opacity-0');
            toast.classList.add('translate-y-0', 'opacity-100');
            setTimeout(() => {
                toast.classList.add('translate-y-20', 'opacity-0');
                toast.classList.remove('translate-y-0', 'opacity-100');
            }, 3000);
        }

        window.onload = initApp;
    </script>
</body>
</html>
