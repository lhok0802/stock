<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2026 실시간 AI 트렌드 리포터 v2</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://t1.kakaocdn.net/kakao_js_sdk/2.8.1/kakao.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Pretendard:wght@400;600;700&display=swap');
        body { font-family: 'Pretendard', sans-serif; background-color: #f8fafc; }
        .glass { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.4); }
        .loading-spinner { border: 3px solid #f3f3f3; border-top: 3px solid #fbbf24; border-radius: 50%; width: 24px; height: 24px; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
    </style>
</head>
<body class="min-h-screen p-4 md:p-8">

    <div class="max-w-6xl mx-auto grid grid-cols-1 lg:grid-cols-12 gap-6">
        
        <!-- Left Column: Config & News -->
        <div class="lg:col-span-5 space-y-6">
            <!-- API Keys Section -->
            <div class="glass rounded-3xl p-6 shadow-xl border-t-4 border-yellow-400">
                <h2 class="text-lg font-bold text-slate-800 mb-4 flex items-center gap-2">
                    <span class="p-1.5 bg-yellow-100 rounded-lg text-yellow-600">🔑</span>
                    API 설정 관리
                </h2>
                <div class="space-y-4">
                    <div>
                        <label class="text-[11px] font-bold text-slate-500 ml-1 uppercase">Kakao JavaScript Key</label>
                        <input type="password" id="kakao-key" placeholder="카카오 JS 키를 입력하세요" class="w-full px-4 py-2.5 rounded-xl border border-slate-200 text-sm focus:ring-2 focus:ring-yellow-400 outline-none transition-all" />
                    </div>
                    <div>
                        <label class="text-[11px] font-bold text-slate-500 ml-1 uppercase">Gemini API Key</label>
                        <input type="password" id="gemini-key" placeholder="제미나이 API 키를 입력하세요" class="w-full px-4 py-2.5 rounded-xl border border-slate-200 text-sm focus:ring-2 focus:ring-blue-400 outline-none transition-all" />
                    </div>
                    <div class="flex gap-2">
                        <button onclick="saveKeys()" class="flex-1 py-2.5 bg-slate-800 text-white rounded-xl text-sm font-bold hover:bg-black transition-all">설정 저장</button>
                        <button onclick="clearKeys()" class="px-4 py-2.5 bg-slate-100 text-slate-500 rounded-xl text-xs font-medium hover:bg-red-50 hover:text-red-600 transition-all">초기화</button>
                    </div>
                </div>
            </div>

            <!-- News Explorer Section -->
            <div class="glass rounded-3xl p-6 shadow-xl h-[500px] flex flex-col border-t-4 border-blue-400">
                <div class="flex justify-between items-center mb-4">
                    <h2 class="text-lg font-bold text-slate-800 flex items-center gap-2">
                        <span class="p-1.5 bg-blue-100 rounded-lg text-blue-600">🌐</span>
                        실시간 뉴스 데이터 (24h)
                    </h2>
                    <button onclick="fetchLatestNews()" id="fetch-btn" class="px-3 py-1 bg-blue-600 text-white text-[10px] font-bold rounded-full hover:bg-blue-700 transition-all">뉴스 갱신</button>
                </div>
                <div id="news-container" class="flex-1 overflow-y-auto space-y-4 pr-2 text-sm text-slate-600">
                    <div class="text-center py-20 opacity-40">
                        <p>키를 입력하고 저장한 후<br>'뉴스 갱신'을 클릭하세요.</p>
                    </div>
                </div>
                <div id="news-loading" class="hidden flex items-center justify-center py-4 gap-2 text-sm text-slate-500">
                    <div class="loading-spinner"></div> 실시간 검색 수행 중...
                </div>
            </div>
        </div>

        <!-- Right Column: AI Report & Kakao -->
        <div class="lg:col-span-7 space-y-6">
            <div class="glass rounded-3xl p-8 shadow-2xl min-h-[700px] flex flex-col relative overflow-hidden border-t-4 border-slate-800">
                <div class="absolute top-0 right-0 p-6 flex gap-3 items-center">
                    <div id="sdk-status" class="flex items-center gap-1.5 text-[10px] font-bold text-red-500">
                        <span class="w-2 h-2 rounded-full bg-red-500"></span> SDK OFFLINE
                    </div>
                </div>

                <div class="mb-6">
                    <h1 class="text-2xl font-black text-slate-900 leading-tight">2026 AI Insight<br><span class="text-blue-600">Executive Report</span></h1>
                    <p class="text-slate-500 text-sm mt-2">전문 애널리스트 페르소나를 통해 실시간 데이터를 분석합니다.</p>
                </div>

                <!-- Report Content Area -->
                <div id="report-area" class="flex-1 bg-white/50 rounded-2xl border border-slate-100 p-6 overflow-y-auto mb-6 whitespace-pre-wrap text-slate-700 leading-relaxed text-sm shadow-inner">
                    분석 데이터가 대기 중입니다. 뉴스 수집 후 'AI 리포트 생성'을 눌러주세요.
                </div>

                <!-- Action Buttons -->
                <div class="grid grid-cols-2 gap-4">
                    <button onclick="generateAIReport()" id="gen-btn" class="py-4 bg-slate-800 text-white rounded-2xl font-bold shadow-lg hover:bg-black disabled:opacity-50 transition-all flex items-center justify-center gap-2">
                        ✨ 리포트 생성
                    </button>
                    <button onclick="sendToKakao()" id="kakao-btn" disabled class="py-4 bg-yellow-400 text-black rounded-2xl font-bold shadow-lg hover:bg-yellow-500 disabled:opacity-50 transition-all flex items-center justify-center gap-2">
                        💬 카톡으로 전송
                    </button>
                </div>
                
                <div id="auth-box" class="mt-4 text-center">
                    <button id="login-trigger" onclick="loginWithKakao()" class="text-[10px] text-slate-400 hover:text-slate-600 underline">현재 비로그인 상태 (카카오 로그인 필요)</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Notification -->
    <div id="toast" class="fixed bottom-10 left-1/2 -translate-x-1/2 translate-y-20 opacity-0 transition-all duration-300 bg-slate-900 text-white px-8 py-3 rounded-full shadow-2xl z-50 text-xs font-medium">
        <span id="toast-msg"></span>
    </div>

    <script>
        const KAKAO_KEY_STORE = 'kakao_key_v2.0';
        const GEMINI_KEY_STORE = 'gemini_key_v2.0';
        const REDIRECT_URI = window.location.origin + window.location.pathname;

        let rawNewsData = "";
        let finalReport = "";

        // 1. 키 저장 및 앱 초기화
        function saveKeys() {
            const kKey = document.getElementById('kakao-key').value.trim();
            const gKey = document.getElementById('gemini-key').value.trim();
            if (kKey) localStorage.setItem(KAKAO_KEY_STORE, kKey);
            if (gKey) localStorage.setItem(GEMINI_KEY_STORE, gKey);
            showToast('API 설정이 저장되었습니다. 시스템을 재시작합니다.');
            setTimeout(() => location.reload(), 1000);
        }

        function clearKeys() {
            if(confirm('모든 API 키 정보를 삭제하시겠습니까?')) {
                localStorage.removeItem(KAKAO_KEY_STORE);
                localStorage.removeItem(GEMINI_KEY_STORE);
                location.reload();
            }
        }

        function initApp() {
            const kKey = localStorage.getItem(KAKAO_KEY_STORE);
            const gKey = localStorage.getItem(GEMINI_KEY_STORE);
            
            if (kKey) {
                document.getElementById('kakao-key').value = kKey;
                try {
                    Kakao.init(kKey);
                    if (Kakao.isInitialized()) {
                        const badge = document.getElementById('sdk-status');
                        badge.innerHTML = '<span class="w-2 h-2 rounded-full bg-green-500"></span> SDK ONLINE';
                        badge.classList.replace('text-red-500', 'text-green-600');
                        checkKakaoAuth();
                    }
                } catch (e) { console.error('Kakao Init Error:', e); }
            }
            if (gKey) document.getElementById('gemini-key').value = gKey;
        }

        // 2. 실시간 뉴스 수집 (Google Search Grounding)
        async function fetchLatestNews() {
            const geminiKey = localStorage.getItem(GEMINI_KEY_STORE);
            if (!geminiKey) return showToast('Gemini API 키를 먼저 설정해 주세요.');

            const container = document.getElementById('news-container');
            const loader = document.getElementById('news-loading');
            const btn = document.getElementById('fetch-btn');

            container.innerHTML = "";
            loader.classList.remove('hidden');
            btn.disabled = true;

            const systemPrompt = `당신은 실시간 뉴스 탐색기입니다. 오늘(2026년 4월 18일) 기준 최근 24시간 이내의 실시간 뉴스를 구글 검색을 통해 찾아주세요. 
            분야: 1. AI 경제/시장 동향, 2. AI 문학/창의적 활용, 3. AI 기술적 돌파구.
            각 뉴스마다 [제목], [내용 요약], [출처 기사 제목 및 날짜]를 명확히 한국어로 작성하세요.`;
            
            try {
                const response = await callGeminiAPI(geminiKey, "실시간 AI 경제, 문학, 기술 뉴스를 검색해줘.", systemPrompt, true);
                const newsText = response.candidates?.[0]?.content?.parts?.[0]?.text || "데이터를 가져올 수 없습니다.";
                
                rawNewsData = newsText;
                container.innerHTML = `<div class="animate-in slide-in-from-bottom-2 duration-500">${newsText.replace(/\n/g, '<br>')}</div>`;
                showToast('최신 뉴스 데이터 수집 완료');
            } catch (e) {
                showToast('뉴스 수집 중 오류가 발생했습니다.');
                console.error(e);
            } finally {
                loader.classList.add('hidden');
                btn.disabled = false;
            }
        }

        // 3. AI 리포트 생성 (애널리스트 페르소나)
        async function generateAIReport() {
            if (!rawNewsData) return showToast('먼저 뉴스 데이터를 갱신해 주세요.');
            const geminiKey = localStorage.getItem(GEMINI_KEY_STORE);
            if (!geminiKey) return showToast('Gemini API 키가 필요합니다.');

            const reportArea = document.getElementById('report-area');
            const genBtn = document.getElementById('gen-btn');

            reportArea.innerText = "수집된 데이터를 분석하여 2026 AI 전략 리포트를 생성하고 있습니다...\n(증권사 애널리스트 톤 분석 중)";
            genBtn.disabled = true;

            const systemPrompt = `당신은 증권사 경력의 수석 애널리스트입니다. 제공된 실시간 뉴스 데이터를 기반으로 '2026 AI 산업 전략 리포트'를 작성하세요.
            반드시 다음 요소를 포함하십시오:
            - 강렬하고 전문적인 제목
            - 📈 경제/시황: 수치와 팩트 중심 분석 (불렛 활용)
            - ✍️ 문학/예술: 창의적 산업의 변화 양상 (불렛 활용)
            - 🤖 기술: 최신 기술 아키텍처나 패러다임 변화 (불렛 활용)
            - 🚀 최종통찰: 사용자에게 행동을 촉구하는 1줄 통찰 (CTA 방식)
            
            카카오톡 전송용이므로 가독성을 위해 이모지를 사용하고, 출처 정보가 있다면 요약에 녹여내세요.`;

            try {
                const response = await callGeminiAPI(geminiKey, `다음 데이터를 분석해 리포트를 작성해줘: ${rawNewsData}`, systemPrompt);
                finalReport = response.candidates?.[0]?.content?.parts?.[0]?.text || "분석 실패";
                reportArea.innerText = finalReport;
                document.getElementById('kakao-btn').disabled = false;
                showToast('AI 리포트 생성 성공');
            } catch (e) {
                showToast('리포트 생성에 실패했습니다.');
            } finally {
                genBtn.disabled = false;
            }
        }

        // 4. 카카오톡 전송 (Text-Heavy Template)
        function sendToKakao() {
            if (!finalReport) return;
            
            Kakao.API.request({
                url: '/v2/api/talk/memo/default/send',
                data: {
                    template_object: {
                        object_type: 'feed',
                        content: {
                            title: '📊 2026 실시간 AI 트렌드 전략 리포트',
                            description: finalReport,
                            image_url: 'https://images.unsplash.com/photo-1451187580459-43490279c0fa?q=80&w=800&auto=format&fit=crop',
                            link: { mobile_web_url: REDIRECT_URI, web_url: REDIRECT_URI },
                        },
                        buttons: [{
                            title: '시스템에서 확인',
                            link: { mobile_web_url: REDIRECT_URI, web_url: REDIRECT_URI }
                        }],
                    },
                },
            })
            .then(() => showToast('✅ 카톡으로 성공적으로 발송되었습니다!'))
            .catch(err => {
                showToast('❌ 발송 실패: 로그인을 먼저 진행하세요.');
            });
        }

        // --- 공통 Gemini API 호출 함수 ---
        async function callGeminiAPI(key, prompt, systemInstruction, useSearch = false) {
            const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${key}`;
            const payload = {
                contents: [{ parts: [{ text: prompt }] }],
                systemInstruction: { parts: [{ text: systemInstruction }] }
            };
            if (useSearch) {
                payload.tools = [{ "google_search": {} }];
            }

            let retries = 5;
            let delay = 1000;
            while (retries > 0) {
                try {
                    const res = await fetch(url, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(payload)
                    });
                    if (res.ok) return await res.json();
                } catch (e) {}
                await new Promise(r => setTimeout(r, delay));
                delay *= 2;
                retries--;
            }
            throw new Error('API 연결에 실패했습니다.');
        }

        function loginWithKakao() {
            Kakao.Auth.authorize({ redirectUri: REDIRECT_URI, scope: 'talk_message' });
        }

        function checkKakaoAuth() {
            const token = getCookie('authorize-access-token');
            if (token) {
                Kakao.Auth.setAccessToken(token);
                document.getElementById('auth-box').innerHTML = '<span class="text-[10px] text-green-600 font-bold">● 카카오 인증 활성화됨</span>';
            }
        }

        function getCookie(name) {
            const parts = document.cookie.split(name + '=');
            if (parts.length === 2) return parts[1].split(';')[0];
            return null;
        }

        function showToast(msg) {
            const t = document.getElementById('toast');
            document.getElementById('toast-msg').innerText = msg;
            t.classList.remove('translate-y-20', 'opacity-0');
            t.classList.add('translate-y-0', 'opacity-100');
            setTimeout(() => {
                t.classList.add('translate-y-20', 'opacity-0');
                t.classList.remove('translate-y-0', 'opacity-100');
            }, 3000);
        }

        window.onload = initApp;
    </script>
</body>
</html>
